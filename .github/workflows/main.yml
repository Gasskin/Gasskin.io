# =============================================================================
# main.yml — 本项目唯一的 GitHub Actions workflow
#
# 规则：
#   所有自动化任务都写在这一个文件里，不要新建其他 workflow 文件。
#   需要新增任务时，在本文件的 steps 中追加即可。
#
# 触发条件：
#   1. push 到 main 分支（用户手动推代码）
#   2. 手动触发（GitHub 页面 → Actions → Run workflow）
#   3. 定时：每天北京时间 18/19/20/21/22 点自动刷新股票数据并部署
#
# 并发控制：
#   同一时间只允许一个 job 部署 Pages，后触发的排队等待（不 cancel）。
# =============================================================================

name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:   # 支持在 GitHub 页面手动触发
  schedule:
    # GitHub Actions 使用 UTC；北京时间(UTC+8) 18,19,20,21,22 点 = UTC 10,11,12,13,14 点
    - cron: '0 10,11,12,13,14 * * *'

# 防止多个 job 同时部署 Pages，后触发的排队等待（不 cancel）
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read    # 允许读取仓库内容
  pages: write      # 允许部署 GitHub Pages
  id-token: write   # GitHub Pages 部署鉴权需要

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── 1. 拉取代码 ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. 准备 Python 环境 ──────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. 刷新股票数据（stock/gen_data.py） ─────────────────────────────
      #   失败不阻断部署：若 Tushare 临时不可用，则沿用仓库中已有的 stock/data。
      - name: Update stock data
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          python -m pip install tushare pandas
          python stock/gen_data.py

      # ── 4. 构建（将源目录打包到 docs/） ──────────────────────────────────
      - name: Build docs
        run: python build.py

      # ── 5. 部署到 GitHub Pages ────────────────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

