name: Update Stock Data & Deploy

on:
  push:
    branches: [main]
  schedule:
    # 北京时间 17:00~24:00 整点（UTC = BJ - 8）
    - cron: '0 9  * * *'   # 17:00 BJ
    - cron: '0 10 * * *'   # 18:00 BJ
    - cron: '0 11 * * *'   # 19:00 BJ
    - cron: '0 12 * * *'   # 20:00 BJ
    - cron: '0 13 * * *'   # 21:00 BJ
    - cron: '0 14 * * *'   # 22:00 BJ
    - cron: '0 15 * * *'   # 23:00 BJ
    - cron: '0 16 * * *'   # 24:00 BJ（次日 00:00 UTC+8）
  workflow_dispatch:   # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install tushare pandas

      - name: Update stock data
        continue-on-error: true   # 数据拉取失败时仍继续构建部署（使用上次 data.json）
        run: python stock/update_data.py

      - name: Build docs
        run: python build.py

      - name: Commit updated data.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add stock/data.json
          git diff --staged --quiet || git commit -m "chore: update stock data $(date -u +%Y-%m-%d) [skip ci]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

