name: Update Stock Data & Deploy

on:
  schedule:
    # 收盘（北京时间 15:30 = UTC 07:30），之后每小时直到 23:30（UTC 15:30）
    - cron: '30 7  * * 1-5'   # 15:30 BJ 收盘
    - cron: '30 8  * * 1-5'   # 16:30 BJ
    - cron: '30 9  * * 1-5'   # 17:30 BJ
    - cron: '30 10 * * 1-5'   # 18:30 BJ
    - cron: '30 11 * * 1-5'   # 19:30 BJ
    - cron: '30 12 * * 1-5'   # 20:30 BJ
    - cron: '30 13 * * 1-5'   # 21:30 BJ
    - cron: '30 14 * * 1-5'   # 22:30 BJ
    - cron: '30 15 * * 1-5'   # 23:30 BJ
  workflow_dispatch:   # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install tushare pandas

      - name: Update stock data
        run: python stock/update_data.py

      - name: Build docs
        run: python build.py

      - name: Commit updated data.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add stock/data.json
          git diff --staged --quiet || git commit -m "chore: update stock data $(date -u +%Y-%m-%d) [skip ci]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

