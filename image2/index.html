<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>图片生成</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <h1>图片生成</h1>
    <p class="sub">调用 OpenAI Images API 生成图片，支持自定义请求网址、token 和生成参数。</p>
  </header>

  <main class="layout">
    <section class="card" aria-labelledby="auth-heading">
      <h2 id="auth-heading">请求配置</h2>
      <div class="top-row">
        <label>
          请求网址
          <select id="baseUrl">
            <option value="https://api.openai.com">https://api.openai.com</option>
            <option value="https://flux.infpro.me">https://flux.infpro.me</option>
            <option value="https://ai.input.im">https://ai.input.im</option>
          </select>
        </label>
        <label>
          Token
          <input id="token" type="password" autocomplete="off" placeholder="请求鉴权 token" />
        </label>
      </div>
      <p class="note">可选请求网址来自 <code>api-whitelist.txt</code>。GitHub Pages 访问时会通过 <code>config.js</code> 中的 Worker 代理转发。</p>
    </section>

    <section class="card" aria-labelledby="prompt-heading">
      <h2 id="prompt-heading">提示词</h2>
      <div class="reference-upload">
        <label id="referenceDropzone" class="upload-box">
          <span>点击上传，或把本地参考图片拖到这里（图生图，可多选）</span>
          <input id="referenceImages" type="file" accept="image/*" multiple />
        </label>
        <div id="referenceList" class="reference-list" aria-live="polite"></div>
      </div>
      <label class="block">
        文本输入框
        <textarea id="prompt" rows="6" placeholder="描述你想生成的图片，例如：A cinematic fantasy castle at sunset, highly detailed"></textarea>
      </label>
    </section>

    <section class="card" aria-labelledby="params-heading">
      <h2 id="params-heading">生成参数</h2>
      <div class="form-grid">
        <label>
          模型
          <input id="model" type="text" value="gpt-image-2" />
        </label>
        <label>
          尺寸档位
          <select id="sizeTier">
            <option value="1k" selected>1K</option>
            <option value="2k">2K</option>
            <option value="4k">4K</option>
          </select>
        </label>
        <label>
          图片比例
          <select id="aspectRatio">
            <option value="1:1">1:1</option>
            <option value="3:2">3:2</option>
            <option value="2:3">2:3</option>
            <option value="4:3">4:3</option>
            <option value="3:4">3:4</option>
            <option value="16:9" selected>16:9</option>
            <option value="9:16">9:16</option>
            <option value="21:9">21:9</option>
            <option value="9:21">9:21</option>
          </select>
        </label>
        <label>
          最终尺寸
          <input id="finalSize" type="text" value="1360x768" readonly />
        </label>
        <label>
          质量
          <select id="quality" disabled>
            <option value="high" selected>high</option>
          </select>
        </label>
        <label>
          输出格式
          <select id="outputFormat" disabled>
            <option value="png" selected>png</option>
          </select>
        </label>
        <label>
          输出压缩（PNG 不适用）
          <input id="outputCompression" type="number" min="0" max="100" value="80" disabled />
        </label>
        <label>
          背景
          <select id="background" disabled>
            <option value="auto" selected>auto</option>
          </select>
        </label>
        <label>
          图片数量
          <div class="count-stepper">
            <input id="count" type="number" min="1" max="10" value="1" inputmode="numeric" />
            <div class="count-buttons">
              <button id="countMinus" type="button" aria-label="减少图片数量">−</button>
              <button id="countPlus" type="button" aria-label="增加图片数量">+</button>
            </div>
          </div>
        </label>
      </div>
    </section>

    <section class="card" aria-labelledby="list-heading">
      <h2 id="list-heading">生成的图片列表</h2>
      <div id="imageList" class="image-list" aria-live="polite">
        <div class="empty">生成任务会显示在这里。</div>
      </div>
    </section>

    <section class="card actions-card" aria-labelledby="actions-heading">
      <h2 id="actions-heading">操作</h2>
      <div class="actions">
        <button id="generateBtn" type="button" class="primary">生成</button>
        <button id="stopBtn" type="button" class="ghost" disabled>停止当前请求</button>
      </div>
      <p class="note">如果浏览器提示 CORS，说明当前请求仍然直连 OpenAI；请改用支持 CORS 预检的 HTTPS 代理地址。</p>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
