feature: 2026-05-29-reference-image-input
created: 2026-05-29

steps:
  - action: "交互骨架：让输入区能接收 paste / dragover / drop，并只在图片存在时进入导入分支"
    exit_signal: "非图片文字粘贴不受影响，图片事件能触发导入 action"
    status: done
  - action: "计算节点：抽出图片文件过滤逻辑，覆盖 clipboard items 与 dataTransfer files"
    exit_signal: "PNG/JPEG/WEBP 会被保留，文本和非图片文件会被忽略"
    status: done
  - action: "状态接入：把新入口复用到现有 importReferenceFiles，保持上传按钮和 footer drop 行为一致"
    exit_signal: "三种入口都调用同一导入路径"
    status: done
  - action: "测试覆盖：补齐组件测试里的粘贴图片、拖入图片、文字粘贴不拦截"
    exit_signal: "相关 Vitest 用例通过"
    status: done
  - action: "联调验证：运行类型检查和测试，必要时构建确认没有 Tauri/Vite 侧回归"
    exit_signal: "pnpm check 通过"
    status: done

