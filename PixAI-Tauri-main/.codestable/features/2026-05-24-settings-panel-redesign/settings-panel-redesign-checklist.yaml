    source: 名词契约
    status: passed
  - item: "高频参数初始可见，高级参数默认折叠但可展开"
    source: 编排骨架
    status: passed
  - item: "打开全局设置窗不会打断当前工作区会话上下文"
    source: 流程级约束
    status: passed
  - item: "主布局存在清晰的全局设置入口，且不再把右侧栏显隐等同于全部设置"
