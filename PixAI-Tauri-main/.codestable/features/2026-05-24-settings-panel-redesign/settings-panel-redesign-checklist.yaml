feature: 2026-05-24-settings-panel-redesign
created: 2026-05-24

steps:
  - action: "按第 2.5 节方案做微重构（只搬不改行为）：拆分设置相关组件目录与骨架"
    exit_signal: "设置相关组件已完成目录与骨架拆分，编译通过，原有交互路径仍可接线"
    status: done
  - action: "结构拆层：分离工作区参数栏与全局设置窗的静态结构"
    exit_signal: "工作区右侧只展示高频参数骨架，全局设置窗可独立打开"
    status: done
  - action: "重排工作区高频参数：引擎、基础参数、高级参数、会话选项"
    exit_signal: "常规生图配置无需浏览应用级状态区块即可完成"
    status: done
  - action: "建立全局设置窗分区：General、Notifications、Services、Extensions"
    exit_signal: "应用级配置可通过左侧导航切换访问，不再依赖长滚动"
    status: done
  - action: "重构 Provider 管理为摘要加详情流，并统一状态卡视觉"
    exit_signal: "Provider 选择和维护职责分离，更新/通知/技能安装以状态卡表达"
    status: done

