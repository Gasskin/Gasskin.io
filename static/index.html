<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>势力分布图</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,500;0,600;1,500&family=Noto+Serif+SC:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-bg" aria-hidden="true"></div>

  <header class="top">
    <div class="top-inner">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <div>
          <h1>势力分布图</h1>
          <p class="hint">点击蜂窝格查看对应王国成员</p>
        </div>
      </div>
    </div>
  </header>

  <main class="layout">
    <section class="map-card" aria-label="势力地图">
      <div class="map-frame">
        <div class="map-wrap">
          <svg id="map" viewBox="0 0 1000 620" preserveAspectRatio="xMidYMid meet" role="img" aria-label="蜂窝势力图"></svg>
        </div>
      </div>
    </section>

    <aside class="panel" id="panel" hidden>
      <div class="panel-ornament top" aria-hidden="true"></div>
      <div class="panel-inner">
        <div class="panel-head">
          <h2 id="panel-title">—</h2>
          <button type="button" id="close-panel" aria-label="关闭">×</button>
        </div>
        <p class="panel-sub">麾下成员</p>
        <ul id="member-list" class="member-list"></ul>
      </div>
      <div class="panel-ornament bottom" aria-hidden="true"></div>
    </aside>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <script src="app.js"></script>
</body>
</html>
