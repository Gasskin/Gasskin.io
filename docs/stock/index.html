<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#080c12" />
  <title>20 日 K 线</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="market-shell">
    <header class="page-head">
      <div>
        <p class="eyebrow">MARKET VIEW</p>
        <h1>20 日 K 线</h1>
      </div>
      <p class="page-hint">选择标的，点击 K 线查看当日涨跌幅</p>
    </header>

    <div class="workspace">
      <aside class="stock-panel" aria-label="标的列表">
        <p class="panel-label">标的</p>
        <nav id="stockNav" class="stock-nav"></nav>
      </aside>

      <section id="chartPanel" class="chart-panel" aria-live="polite">
        <div id="loading" class="loading">正在加载行情…</div>
      </section>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
